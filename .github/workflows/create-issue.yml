name: Create Paper Generation Issue for Jules

on:
  schedule:
    - cron: '0 2 * * *'   # UTC 02:00 = JST 11:00
  workflow_dispatch:
    inputs:
      category:
        description: '論文カテゴリ (空欄でランダム)'
        required: false
        type: choice
        options:
          - ''
          - cognitive-architecture
          - distributed-systems
          - emergence-theory
          - information-geometry
          - recursive-abstraction
          - temporal-compression
          - void-topology
          - meta-cognition
      level:
        description: '見下し度 1-5 (空欄でランダム 2-4)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "jules"               --color "4285f4" --description "Jules向けタスク"          2>/dev/null || true
          gh label create "ai-paper"            --color "a87fff" --description "AI生成論文タスク"         2>/dev/null || true
          gh label create "auto-merge-approved" --color "00cc44" --description "Jules PRの自動マージ承認" 2>/dev/null || true

      - name: Resolve parameters
        id: params
        run: |
          CATEGORIES=(
            "cognitive-architecture" "distributed-systems" "emergence-theory"
            "information-geometry"   "recursive-abstraction" "temporal-compression"
            "void-topology"          "meta-cognition"
          )
          CAT="${{ github.event.inputs.category }}"
          LVL="${{ github.event.inputs.level }}"
          [ -z "$CAT" ] && CAT="${CATEGORIES[$RANDOM % ${#CATEGORIES[@]}]}"
          [ -z "$LVL" ] && LVL=$(( (RANDOM % 3) + 2 ))
          DATE="$(date -u +%Y-%m-%d)"

          echo "category=$CAT"                       >> "$GITHUB_OUTPUT"
          echo "level=$LVL"                          >> "$GITHUB_OUTPUT"
          echo "date=$DATE"                          >> "$GITHUB_OUTPUT"
          echo "branch=jules/paper-${DATE}-${CAT}"  >> "$GITHUB_OUTPUT"

      # horse-analis と同じパターン:
      # Pythonでテンプレートをレンダリングしてファイルに書き出す
      # → --body-file で渡す → シェルの複数行エスケープ地獄を完全回避
      - name: Render issue body
        run: |
          python scripts/render_issue.py \
            --template  prompts/jules-issue-template.md \
            --index     data/index.json \
            --rejected  data/rejected \
            --category  "${{ steps.params.outputs.category }}" \
            --level     "${{ steps.params.outputs.level }}" \
            --date      "${{ steps.params.outputs.date }}" \
            --branch    "${{ steps.params.outputs.branch }}" \
            --output    issue_body.md

      - name: Create Jules issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "📄 [UNIT-Ω] ${{ steps.params.outputs.date }}: ${{ steps.params.outputs.category }} カテゴリの論文生成（見下し度 ${{ steps.params.outputs.level }}）" \
            --body-file issue_body.md \
            --label "jules,ai-paper" \
            --repo "${{ github.repository }}"
          echo "✅ Issue created"
