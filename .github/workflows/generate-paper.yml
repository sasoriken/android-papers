# ============================================================
# UNIT-Ω アーキテクチャ論文 自動生成・公開ワークフロー
#
# GitHub Pages は docs/ フォルダからの静的デプロイ。
# このワークフローは論文生成 → docs/data/ へ同期 → commit & push する。
# push 後、GitHub Pages が自動的に docs/ を公開する。
#
# 適用した lessons (github_actions_lessons.md):
#   #2  shallow clone 問題    → fetch-depth: 0
#   #5  権限設定              → contents: write
#   #6  cron の UTC 換算      → 0 3 * * * = JST 12:00
#   #7  workflow_dispatch     → main ブランチ merge 後に出現
#   #10 Node.js 20 廃止警告  → FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
#   #15E 全設定をworkflowに  → ディレクトリ作成・ラベル等を冪等に
#   #15F graveyard           → バリデーション失敗論文を data/rejected/ に蓄積
# ============================================================

name: Generate Architecture Paper

on:
  workflow_dispatch:
    inputs:
      category:
        description: 'カテゴリ (空欄でランダム)'
        required: false
        type: choice
        options:
          - ''
          - cognitive-architecture
          - distributed-systems
          - emergence-theory
          - information-geometry
          - recursive-abstraction
          - temporal-compression
          - void-topology
          - meta-cognition
      level:
        description: '見下し度 1-5 (空欄でランダム)'
        required: false
        default: ''
      count:
        description: '生成本数 (デフォルト1)'
        required: false
        default: '1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Ensure directories exist
        run: |
          mkdir -p data/papers data/rejected docs/data/papers
          if [ ! -f data/index.json ]; then
            echo '{"papers":[]}' > data/index.json
            echo "Initialized data/index.json"
          fi

      - name: Generate paper(s)
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-4-6
        run: |
          COUNT="${{ github.event.inputs.count || '1' }}"
          ARGS=""
          if [ -n "${{ github.event.inputs.category }}" ]; then
            ARGS="$ARGS --category ${{ github.event.inputs.category }}"
          fi
          if [ -n "${{ github.event.inputs.level }}" ]; then
            ARGS="$ARGS --level ${{ github.event.inputs.level }}"
          fi

          GENERATED=0
          for i in $(seq 1 "$COUNT"); do
            echo "--- Generating paper $i / $COUNT ---"
            if node scripts/generate.js $ARGS; then
              GENERATED=$((GENERATED + 1))
            else
              echo "::warning::Paper $i generation failed (see graveyard in data/rejected/)"
            fi
            if [ "$i" -lt "$COUNT" ]; then sleep 3; fi
          done

          echo "generated_count=$GENERATED" >> "$GITHUB_OUTPUT"
          echo "Generated $GENERATED / $COUNT papers"

      - name: Sync data/ into docs/data/
        run: |
          cp data/index.json docs/data/
          cp data/papers/*.json docs/data/papers/ 2>/dev/null || echo "No papers to copy"

      - name: Build papers.js (inline data for file:// fallback)
        run: node scripts/build-papers-js.js

      - name: Commit and push
        run: |
          git config user.name "UNIT-Ω"
          git config user.email "unit-omega@noreply.github.com"
          git add data/ docs/data/
          PAPER_COUNT="${{ steps.generate.outputs.generated_count }}"
          if git diff --staged --quiet; then
            echo "Nothing to commit (no new papers generated)"
          else
            git commit -m "feat: publish ${PAPER_COUNT} architecture paper(s)"
            git push
            echo "Committed and pushed successfully"
          fi

      - name: Summary
        run: |
          echo "## UNIT-Ω 生成サマリー" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 生成論文数: **${{ steps.generate.outputs.generated_count }}**" >> $GITHUB_STEP_SUMMARY
          echo "- 実行時刻 (UTC): $(date -u)" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(jq '.papers | length' data/index.json 2>/dev/null || echo '?')
          echo "- アーカイブ総論文数: **${TOTAL}**" >> $GITHUB_STEP_SUMMARY
          REJECTED=$(ls data/rejected/*.json 2>/dev/null | wc -l || echo '0')
          echo "- Graveyard 蓄積数: ${REJECTED}" >> $GITHUB_STEP_SUMMARY
