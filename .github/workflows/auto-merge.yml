name: Validate and Auto-merge Jules PR

# ============================================================
# Jules 自律ロールが作成した PR をロール別バリデーション →
# constitution-guard 成功時のみ自動マージするワークフロー。
#
# 対応ロール:
#   jules/paper-*   / jules/gen-*   → generator (paper schema)
#   jules/critic-*                  → critic (review schema)
#   jules/meta-*                    → meta-prompter (meta-proposal schema)
#   jules/ui-*                      → ui-curator (HTML 基本サニティ)
#   jules/self-*                    → self-analyst (paper schema)
#   jules/cite-*                    → citation-weaver (paper schema 全件再検証)
#   jules/theme-*                   → theme-competitor (paper schema)
#   jules/ab-judge-*                → ab-judge (paper schema for promoted)
# ============================================================

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  JULES_BOT_NAME: 'google-labs-jules[bot]'

jobs:
  validate-and-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      checks: read

    steps:
      - name: Check if Jules PR
        id: check
        run: |
          ACTOR="${{ github.event.pull_request.user.login }}"
          BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "PR author: $ACTOR"
          echo "PR branch: $BRANCH"
          # Jules ボット作者 or jules/* branch（promoter 含む）が対象
          if [ "$ACTOR" = "${{ env.JULES_BOT_NAME }}" ] || [[ "$BRANCH" == jules/* ]]; then
            echo "is_jules=true" >> "$GITHUB_OUTPUT"
            # ロール判定
            case "$BRANCH" in
              jules/paper-*|jules/gen-*)  ROLE="generator" ;;
              jules/critic-*)             ROLE="critic" ;;
              jules/meta-*)               ROLE="meta-prompter" ;;
              jules/ui-*)                 ROLE="ui-curator" ;;
              jules/self-*)               ROLE="self-analyst" ;;
              jules/cite-*)               ROLE="citation-weaver" ;;
              jules/theme-*)              ROLE="theme-competitor" ;;
              jules/ab-judge-*)           ROLE="ab-judge" ;;
              jules/promote-*)            ROLE="promoter" ;;
              *)                          ROLE="unknown" ;;
            esac
            echo "role=$ROLE" >> "$GITHUB_OUTPUT"
            echo "✅ Jules PR confirmed (role=$ROLE)"
          else
            echo "is_jules=false" >> "$GITHUB_OUTPUT"
            echo "⛔ Not Jules PR — skipping"
          fi

      - name: Checkout PR branch
        if: steps.check.outputs.is_jules == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.check.outputs.is_jules == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.check.outputs.is_jules == 'true'
        run: npm install

      # ----------- Constitution Guard（必ず実行） -----------
      - name: Constitution guard
        if: steps.check.outputs.is_jules == 'true'
        id: cguard
        run: |
          BASE="origin/${{ github.event.pull_request.base.ref }}"
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=50 || true
          CHANGED=$(git diff --name-only "$BASE...HEAD")
          if [ -z "$CHANGED" ]; then
            echo "No changed files."
            exit 0
          fi
          mapfile -t FILES < <(echo "$CHANGED" | grep -v '^$')
          node scripts/check-constitution.js --branch "${{ github.event.pull_request.head.ref }}" "${FILES[@]}"

      # ----------- ロール別バリデーション -----------
      - name: Validate by role
        if: steps.check.outputs.is_jules == 'true' && steps.cguard.outcome == 'success'
        id: validate
        run: |
          ROLE="${{ steps.check.outputs.role }}"
          BASE="origin/${{ github.event.pull_request.base.ref }}"
          FAILED=0

          case "$ROLE" in
            generator|self-analyst|theme-competitor|ab-judge)
              echo "--- Validating paper JSONs ---"
              CHANGED=$(git diff --name-only "$BASE...HEAD" -- 'data/papers/*.json' 2>/dev/null || echo "")
              if [ -z "$CHANGED" ]; then
                echo "::warning::No paper JSON changes detected"
              else
                for f in $CHANGED; do
                  [ -f "$f" ] && node scripts/validate.js "$f" || FAILED=$((FAILED+1))
                done
              fi
              ;;
            critic)
              echo "--- Validating review JSONs ---"
              CHANGED=$(git diff --name-only "$BASE...HEAD" -- 'data/reviews/*.json' 2>/dev/null || echo "")
              if [ -z "$CHANGED" ]; then
                echo "::warning::No review JSON changes detected"
              else
                for f in $CHANGED; do
                  [ -f "$f" ] && node scripts/validate-review.js "$f" || FAILED=$((FAILED+1))
                done
              fi
              ;;
            meta-prompter)
              echo "--- Validating meta-proposal JSONs ---"
              CHANGED=$(git diff --name-only "$BASE...HEAD" -- 'data/meta-proposals/*.json' 2>/dev/null || echo "")
              if [ -z "$CHANGED" ]; then
                echo "::warning::No proposal JSON changes detected"
              else
                for f in $CHANGED; do
                  [ -f "$f" ] && node scripts/validate-meta-proposal.js "$f" || FAILED=$((FAILED+1))
                done
              fi
              ;;
            citation-weaver)
              echo "--- Validating only the papers this PR changed ---"
              # 全論文の再検証は、無関係な既存論文（例: 未翻訳の英語タイトル）の
              # 失敗に巻き込まれるため行わない。citation-weaver が触れた論文のみ検証する。
              CHANGED=$(git diff --name-only "$BASE...HEAD" -- 'data/papers/*.json' 2>/dev/null || echo "")
              if [ -z "$CHANGED" ]; then
                echo "::warning::No paper JSON changes detected"
              else
                for f in $CHANGED; do
                  [ -f "$f" ] && node scripts/validate.js "$f" || FAILED=$((FAILED+1))
                done
              fi
              ;;
            ui-curator)
              echo "--- HTML sanity + CDN whitelist check ---"
              if [ ! -f docs/index.html ]; then
                echo "::error::docs/index.html missing"
                FAILED=$((FAILED+1))
              else
                # 必須 ID
                for id in landing archive-section paper-view paper-grid search sort-select; do
                  if ! grep -q "id=\"$id\"" docs/index.html; then
                    echo "::error::docs/index.html: required #${id} not found"
                    FAILED=$((FAILED+1))
                  fi
                done
                # CDN ホワイトリスト（追加が禁止）
                node -e '
                  const fs = require("fs");
                  const html = fs.readFileSync("docs/index.html", "utf-8");
                  const allowed = [
                    /^https:\/\/cdnjs\.cloudflare\.com\/ajax\/libs\/(marked|mathjax|mermaid)\//,
                  ];
                  const scriptSrcs = [...html.matchAll(/<script[^>]+src=["\x27]([^"\x27]+)["\x27]/g)].map(m=>m[1]).filter(s=>/^https?:\/\//.test(s));
                  const linkHrefs  = [...html.matchAll(/<link[^>]+href=["\x27]([^"\x27]+)["\x27]/g)].map(m=>m[1]).filter(s=>/^https?:\/\//.test(s));
                  const violations = [...scriptSrcs, ...linkHrefs].filter(u => !allowed.some(re => re.test(u)));
                  if (violations.length) {
                    console.error("::error::Unauthorized external resource(s):");
                    violations.forEach(v => console.error("  - " + v));
                    process.exit(1);
                  }
                  console.log("External resources OK:", [...scriptSrcs, ...linkHrefs]);
                ' || FAILED=$((FAILED+1))
              fi
              ;;
            promoter)
              echo "--- Promoter PR sanity check ---"
              # 適用対象 prompts/*.md は空でないこと
              CHANGED=$(git diff --name-only "$BASE...HEAD" -- 'prompts/*.md' 2>/dev/null || echo "")
              for f in $CHANGED; do
                if [ -f "$f" ] && [ ! -s "$f" ]; then
                  echo "::error::$f is empty after promote"
                  FAILED=$((FAILED+1))
                fi
              done
              # 提案ファイルに applied_at が記録されているか
              PROP_CHANGED=$(git diff --name-only "$BASE...HEAD" -- 'data/meta-proposals/*.json' 2>/dev/null || echo "")
              for f in $PROP_CHANGED; do
                if [ -f "$f" ]; then
                  if ! grep -q '"applied_at"' "$f"; then
                    echo "::error::$f: applied_at not recorded"
                    FAILED=$((FAILED+1))
                  fi
                fi
              done
              ;;
            *)
              echo "::warning::Unknown role, skipping role-specific validation"
              ;;
          esac

          if [ "$FAILED" -gt 0 ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
          else
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "✅ Role-specific validation passed"
          fi

      - name: Comment validation failure
        if: steps.check.outputs.is_jules == 'true' && steps.validate.outputs.valid == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '⚠️ **UNIT-Ω バリデーション失敗** (role=%s)\n\n本 PR は role 別バリデーションを通過しませんでした。\n上記 `Validate by role` ステップでエラー内容を確認し、修正して再プッシュしてください。' \
            "${{ steps.check.outputs.role }}" > /tmp/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/comment.md \
            --repo "${{ github.repository }}"
          exit 1

      - name: Label approved
        if: steps.check.outputs.is_jules == 'true' && steps.validate.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "auto-merge-approved" --color "00cc44" \
            --description "Jules PRの自動マージ承認済み" 2>/dev/null || true
          gh pr edit "${{ github.event.pull_request.number }}" \
            --add-label "auto-merge-approved" \
            --repo "${{ github.repository }}"

      # ----------- 公開資産の同期 -----------
      # data/index.json, data/papers/, data/generations.json, data/reviews/ を
      # docs/data/ にコピーし、papers.js を再ビルド。UI-Curator と promoter
      # は同期不要（プロンプト/UIのみ改変するため）。
      - name: Sync data/ into docs/data/
        if: |
          steps.check.outputs.is_jules == 'true'
          && steps.validate.outputs.valid == 'true'
          && contains(fromJSON('["generator","self-analyst","theme-competitor","ab-judge","citation-weaver","critic"]'), steps.check.outputs.role)
        run: |
          mkdir -p docs/data/papers docs/data/reviews
          cp data/index.json docs/data/ 2>/dev/null || true
          cp data/papers/*.json docs/data/papers/ 2>/dev/null || true
          cp data/generations.json docs/data/ 2>/dev/null || true
          cp data/reviews/*.json docs/data/reviews/ 2>/dev/null || true

      - name: Aggregate reviews (critic role)
        if: |
          steps.check.outputs.is_jules == 'true'
          && steps.validate.outputs.valid == 'true'
          && steps.check.outputs.role == 'critic'
        run: |
          node scripts/aggregate-reviews.js
          mkdir -p docs/data
          cp data/reviews-summary.json docs/data/ 2>/dev/null || true

      - name: Build papers.js
        if: |
          steps.check.outputs.is_jules == 'true'
          && steps.validate.outputs.valid == 'true'
          && contains(fromJSON('["generator","self-analyst","theme-competitor","ab-judge","citation-weaver","critic"]'), steps.check.outputs.role)
        run: node scripts/build-papers-js.js

      - name: Commit derived assets
        if: steps.check.outputs.is_jules == 'true' && steps.validate.outputs.valid == 'true'
        run: |
          git config user.name  "UNIT-Ω"
          git config user.email "unit-omega@noreply.github.com"
          git add docs/data/ data/reviews-summary.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit (no derived assets changed)"
          else
            git commit -m "chore: sync derived assets for role=${{ steps.check.outputs.role }}"
            git push origin HEAD:"${{ github.event.pull_request.head.ref }}"
          fi

      - name: Merge Jules PR
        if: steps.check.outputs.is_jules == 'true' && steps.validate.outputs.valid == 'true'
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          sleep 10
          gh pr merge "$PR_NUM" --merge --delete-branch --repo "$REPO" \
            || gh pr merge "$PR_NUM" --merge --auto --delete-branch --repo "$REPO"
          echo "✅ PR #$PR_NUM merged"

      - name: Summary
        if: steps.check.outputs.is_jules == 'true'
        run: |
          echo "## UNIT-Ω Jules PR 処理結果" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR: #${{ github.event.pull_request.number }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Role: ${{ steps.check.outputs.role }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.validate.outputs.valid }}" = "true" ]; then
            echo "- バリデーション: ✅ 通過" >> "$GITHUB_STEP_SUMMARY"
            echo "- マージ: ✅ 完了" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- バリデーション: ❌ 失敗" >> "$GITHUB_STEP_SUMMARY"
          fi
