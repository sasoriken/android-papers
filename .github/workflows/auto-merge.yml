name: Validate and Auto-merge Jules PR → Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  JULES_BOT_NAME: 'google-labs-jules[bot]'

jobs:
  validate-and-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check PR author is Jules
        id: check
        run: |
          ACTOR="${{ github.event.pull_request.user.login }}"
          echo "PR author: $ACTOR"
          if [ "$ACTOR" = "${{ env.JULES_BOT_NAME }}" ]; then
            echo "is_jules=true"  >> "$GITHUB_OUTPUT"
            echo "✅ Jules PR confirmed"
          else
            echo "is_jules=false" >> "$GITHUB_OUTPUT"
            echo "⛔ Not Jules (author=$ACTOR) — skipping all steps"
          fi

      - name: Checkout PR branch
        if: steps.check.outputs.is_jules == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.check.outputs.is_jules == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.check.outputs.is_jules == 'true'
        run: npm install

      - name: Validate changed papers
        if: steps.check.outputs.is_jules == 'true'
        id: validate
        run: |
          CHANGED=$(git diff --name-only "origin/${{ github.event.pull_request.base.ref }}...HEAD" \
            -- 'data/papers/*.json' 2>/dev/null || echo "")

          if [ -z "$CHANGED" ]; then
            echo "::warning::No paper JSON changes detected"
            echo "valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed papers: $CHANGED"
          FAILED=0
          for f in $CHANGED; do
            [ -f "$f" ] && node scripts/validate.js "$f" || FAILED=$((FAILED+1))
          done

          if [ "$FAILED" -gt 0 ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
          else
            echo "valid=true"  >> "$GITHUB_OUTPUT"
            echo "✅ All papers passed validation"
          fi

      - name: Comment validation failure
        if: steps.check.outputs.is_jules == 'true' && steps.validate.outputs.valid == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '⚠️ **UNIT-Ω バリデーション失敗**\n\n論文JSONがスキーマを満たしていないためマージを中止しました。\n上記 `Validate changed papers` ステップでエラー内容を確認し、修正して再プッシュしてください。' \
            > /tmp/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/comment.md \
            --repo "${{ github.repository }}"
          exit 1

      - name: Label Jules PR as approved
        if: steps.check.outputs.is_jules == 'true' && steps.validate.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "auto-merge-approved" --color "00cc44" \
            --description "Jules PRの自動マージ承認済み" 2>/dev/null || true
          gh pr edit "${{ github.event.pull_request.number }}" \
            --add-label "auto-merge-approved" \
            --repo "${{ github.repository }}"

      - name: Sync data/ into site/data/
        if: steps.check.outputs.is_jules == 'true' && steps.validate.outputs.valid == 'true'
        run: |
          mkdir -p site/data/papers
          cp data/index.json site/data/
          cp data/papers/*.json site/data/papers/ 2>/dev/null || true

      - name: Commit site/data/ sync to PR branch
        if: steps.check.outputs.is_jules == 'true' && steps.validate.outputs.valid == 'true'
        run: |
          git config user.name  "UNIT-Ω"
          git config user.email "unit-omega@noreply.github.com"
          git add site/data/
          git diff --staged --quiet \
            || git commit -m "chore: sync site/data/ [skip ci]"
          git push origin HEAD:"${{ github.event.pull_request.head.ref }}"

      - name: Merge Jules PR
        if: steps.check.outputs.is_jules == 'true' && steps.validate.outputs.valid == 'true'
        id: merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          sleep 10
          gh pr merge "$PR_NUM" --merge --delete-branch --repo "$REPO" \
            || gh pr merge "$PR_NUM" --merge --auto --delete-branch --repo "$REPO"
          echo "✅ PR #$PR_NUM merged"

      - name: Checkout main after merge
        if: steps.check.outputs.is_jules == 'true' && steps.validate.outputs.valid == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup GitHub Pages
        if: steps.check.outputs.is_jules == 'true' && steps.validate.outputs.valid == 'true'
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: steps.check.outputs.is_jules == 'true' && steps.validate.outputs.valid == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.is_jules == 'true' && steps.validate.outputs.valid == 'true'
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary
        if: steps.check.outputs.is_jules == 'true'
        run: |
          echo "## UNIT-Ω Jules PR 処理結果" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR: #${{ github.event.pull_request.number }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.validate.outputs.valid }}" = "true" ]; then
            echo "- バリデーション: ✅ 通過" >> "$GITHUB_STEP_SUMMARY"
            echo "- 公開URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
            TOTAL=$(jq '.papers | length' data/index.json 2>/dev/null || echo '?')
            echo "- アーカイブ総論文数: **${TOTAL}**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- バリデーション: ❌ 失敗" >> "$GITHUB_STEP_SUMMARY"
          fi
